<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create a new account to access our services." />
  <title>Create Account | OIDC Auth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <main class="card">
    <header class="header">
      <a href="/" class="icon" aria-label="Go to home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2z" />
          <path d="M20 21a8 8 0 1 0-16 0" />
        </svg>
      </a>
      <h1>Create an account</h1>
      <p class="subtitle">Enter your details to get started</p>
    </header>

    <form class="form" id="signupForm" novalidate>
      <div id="errorMsg" class="error-msg" role="alert" aria-live="polite"></div>
      <div id="successMsg" class="success-msg" role="status" aria-live="polite"></div>

      <div class="field-row">
        <div class="field">
          <label for="firstName">First name</label>
          <input id="firstName" name="firstName" type="text" autocomplete="given-name" placeholder="John" required
            aria-required="true" />
        </div>
        <div class="field">
          <label for="lastName">Last name</label>
          <input id="lastName" name="lastName" type="text" autocomplete="family-name" placeholder="Doe"
            aria-required="true" />
        </div>
      </div>

      <div class="field">
        <label for="email">Email address</label>
        <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required
          aria-required="true" />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" placeholder="••••••••" required
          aria-required="true" aria-describedby="passwordHint" />
        <span class="hint" id="passwordHint">Must be at least 8 characters</span>
      </div>

      <div class="field">
        <label for="confirmPassword">Confirm password</label>
        <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password"
          placeholder="••••••••" required aria-required="true" aria-describedby="confirmHint" />
        <span class="hint error" id="confirmHint" style="display:none">Passwords do not match</span>
      </div>

      <button type="submit" id="submitBtn">
        <span class="spinner" id="spinner" aria-hidden="true"></span>
        <span id="btnText">Create account</span>
      </button>

      <p class="terms">
        By creating an account you agree to our
        <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
      </p>
    </form>

    <footer class="footer">
      Already have an account? <a id="signinLink" href="/v1/authenticate">Sign in</a>
    </footer>
  </main>

  <script>
    const form = document.getElementById('signupForm');
    const submitBtn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirmPassword');
    const confirmHint = document.getElementById('confirmHint');
    const signinLink = document.getElementById('signinLink');

    const params = new URLSearchParams(window.location.search);
    const clientId = params.get('client_id');

    if (clientId) {
      signinLink.href = `/v1/authenticate?client_id=${encodeURIComponent(clientId)}`;
    }


    confirmInput.addEventListener('input', () => {
      const mismatch = confirmInput.value && confirmInput.value !== passwordInput.value;
      confirmHint.style.display = mismatch ? 'block' : 'none';
      confirmInput.setAttribute('aria-invalid', mismatch ? 'true' : 'false');
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
      successMsg.style.display = 'none';
    }

    function showSuccess(msg) {
      successMsg.textContent = msg;
      successMsg.style.display = 'block';
      errorMsg.style.display = 'none';
    }

    function hideMessages() {
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
    }

    function setLoading(loading) {
      submitBtn.disabled = loading;
      spinner.style.display = loading ? 'block' : 'none';
      btnText.textContent = loading ? 'Creating account…' : 'Create account';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmInput.value;

      if (!firstName || !lastName || !email || !password || !confirmPassword) {
        showError('Please fill in all fields.');
        return;
      }

      if (password.length < 8) {
        showError('Password must be at least 8 characters.');
        return;
      }

      if (password !== confirmPassword) {
        showError('Passwords do not match.');
        return;
      }

      setLoading(true);

      try {
        const res = await fetch('/v1/authenticate/sign-up', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            firstName,
            lastName,
            email,
            password,
          }),
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          showError(data.message || 'Something went wrong. Please try again.');
        } else if (data.redirect) {
          showSuccess('Account created successfully. Redirecting...');
          setTimeout(() => {
            window.location.href = data.redirect;
          }, 1000);
        } else {
          showSuccess('Account created successfully.');
        }
      } catch {
        showError('Something went wrong. Please try again.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>

</html>
